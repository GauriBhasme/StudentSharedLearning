<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Skill Request</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="./styles/createrequest.css">
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4 request-card">
      <h4 class="fw-bold mb-3 text-primary">New Skill Request</h4>

      <form action="{{ url_for('request.create_request') }}" method="POST">
        <!-- Message -->
        <div class="mb-3">
          <label for="message" class="form-label">Your Message</label>
          <textarea class="form-control" id="message" name="message" rows="3" placeholder="Briefly explain what you'd like to learn..." required></textarea>
        </div>

        <!-- Preferred Time -->
        <div class="mb-3">
          <label for="time" class="form-label">Preferred Time</label>
          <input type="text" class="form-control" id="time" placeholder="e.g. Weekends, 4 PM" required>
        </div>

        <a href="{{ url_for('student.get_discover') }}"><button type="button" class="btn btn-secondary mb-2 select-teacher-btn"  data-id="${student.student_id}">Find Teacher</button></a>
        <!-- Submit -->
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Send Request</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
   


function create_request_send(){
      // Get the selected teacher from localStorage
      const selectedTeacher = localStorage.getItem("selectedTeacher");
  
      if (selectedTeacher) {
          // Send the selected teacher ID to the server (you can use fetch or form submission)
          fetch('/create-request', {
              method: 'POST',
              headers: {
                  'Content-Type': 'application/json'
              },
              body: JSON.stringify({ teacher_id: selectedTeacher })
          })
          .then(response => response.json())
          .then(data => {
              console.log('Teacher selected', data);
              // Clear the selected teacher from localStorage
              localStorage.removeItem("selectedTeacher");
          })
          .catch(error => {
              console.error('Error sending request:', error);
          });
      } else {
          console.error('No teacher selected');
      }
}
  </script>
</body>
</html>
