<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or "Scholarly Exchange - Login" }}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./styles/login.css">
</head>

<body>

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4 login-card">

      <!-- Heading -->
      <h2 class="text-center fw-bold mb-2">Scholarly Exchange</h2>
      <h5 class="text-center mb-3">Welcome Back</h5>
      <p class="text-center text-muted">
        Continue your journey of peer-to-peer knowledge sharing at the Atelier.
      </p>

      <!-- Flash Messages -->
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert alert-danger">
            {{ messages[0] }}
          </div>
        {% endif %}
      {% endwith %}

      <!-- Login Form -->
      <form action="{{ url_for('auth.login_user') }}" method="POST">
        <div class="mb-3">
          <label class="form-label text-uppercase">Email</label>
          <input type="email" name="email" class="form-control"
                 placeholder="student@university.edu" required>
        </div>

        <div class="mb-3">
          <label class="form-label text-uppercase">Password</label>
          <div class="input-group">
            <input type="password" name="password" class="form-control"
                   placeholder="Enter your password" required>
            <button class="btn btn-link forgot-btn" type="button">Forgot?</button>
          </div>
        </div>

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary">
            Login →
          </button>
        </div>
      </form>

      <!-- Social Login -->
      <div class="text-center my-3">
        <small class="text-muted">OR ACCESS VIA</small>
      </div>

      <div class="d-flex justify-content-center gap-3 mb-3">
        <button class="btn btn-outline-danger w-50">Google</button>
        <button class="btn btn-outline-dark w-50">GitHub</button>
      </div>

      <!-- Register -->
      <div class="text-center">
        <small class="text-muted">
          Don't have an account?
          <a href="{{ url_for('auth.register_page') }}">Register</a>
        </small>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
