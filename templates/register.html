<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or "Create Account - Scholarly Exchange" }}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./styles/register.css">
</head>

<body>

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4 register-card">

      <!-- Heading -->
      <h2 class="text-center fw-bold mb-2">Create your account</h2>
      <p class="text-center text-muted mb-4">
        Enter your details to join the community
      </p>

      <!-- Flash Messages -->
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert alert-danger">
            {{ messages[0] }}
          </div>
        {% endif %}
      {% endwith %}

      <!-- Form -->
      <form action="{{ url_for('auth.register_user') }}" method="POST">

        <!-- Full Name -->
        <div class="mb-3">
          <label class="form-label text-uppercase">Full Name</label>
          <input type="text" class="form-control" name="name"
                 placeholder="Alex Johnson" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label text-uppercase">University Email</label>
          <input type="email" class="form-control" name="email"
                 placeholder="alex.j@university.edu" required>
        </div>

        <!-- Department -->
        <div class="mb-3">
          <label class="form-label text-uppercase">Department</label>
          <select class="form-select" name="department" required>
            <option disabled selected>Select</option>

            {% for dept in departments %}
              <option value="{{ dept }}">{{ dept }}</option>
            {% endfor %}

          </select>
        </div>

        <!-- Academic Year -->
        <div class="mb-3">
          <label class="form-label text-uppercase">Academic Year</label>
          <select class="form-select" name="year" required>
            <option disabled selected>Select</option>

            {% for y in years %}
              <option value="{{ y }}">{{ y }}</option>
            {% endfor %}

          </select>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label text-uppercase">Password</label>
          <input type="password" class="form-control" name="password"
                 placeholder="••••••••" required>
        </div>

        <!-- Button -->
        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary">
            Register Account
          </button>
        </div>

      </form>

      <!-- Back to Login -->
      <div class="text-center">
        <small class="text-muted">
          Already have an account?
          <a href="{{ url_for('auth.login_user') }}">Back to login</a>
        </small>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>+
